import:
  - ~/.config/alacritty/themes/thelovelace.yaml
  # - ~/.config/alacritty/themes/tokyo-night.yaml
  # - ~/.config/alacritty/themes/pencil_dark.yaml
  # - ~/.config/alacritty/themes/omni.yml
  # - ~/.config/alacritty/themes/iterm.yaml
  # - ~/.config/alacritty/themes/gnome_terminal.yaml

env:
  TERM: xterm-256color

window:
  decorations: none

  dynamic_padding: true

  opacity: 1

  position:
    x: 150
    y: 110

  padding:
    x: 6
    y: 6

  dimensions:
    columns: 140
    lines: 30

font:
  normal:
    family: "FiraCode Nerd Font Mono"
    style: Medium

  bold:
    family: "FiraCode Nerd Font Mono"
    style: Bold

  italic:
    family: "FiraCode Nerd Font Mono"
    style: "Light Italic"

  size: 10.0

draw_bold_text_with_bright_colors: true
live_config_reload: true

mouse:
  hide_when_typing: true

cursor:
  style:
    shape: Block
    blinking: On

key_bindings:
  - { key: F11, action: ToggleFullscreen }
  - { key: Equals, mods: Command, action: IncreaseFontSize }
  - { key: Minus, mods: Command, action: DecreaseFontSize }
  - { key: Key0, mods: Command, action: ResetFontSize }

  # - { key: Up,       mods: None, action: ScrollPageUp }
  # - { key: Down,     mods: None, action: ScrollPageDown }
  - { key: PageUp,   mods: None, action: ScrollPageUp }
  - { key: PageDown, mods: None, action: ScrollPageDown }
